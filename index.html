<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    body {
      background-color: hsl(212, 45%, 89%);
      text-align: center;
      font-family: 'Outfit', sans-serif;
    }
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    .card {
      width: min(90vw, 320px);
      margin: 0 auto;
      background-color: hsl(0, 0%, 100%);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin-top: 80px;
    }

    img {
      border-radius: 10px;
    }

    h2 {
      font-weight: 700;
    }

    p {
      font-size: 15px;
      font-weight: 400;
    }

    footer {
      position: fixed;
      bottom: 0;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="images/image-qr-code.png" alt="QR Code component" width="100%" height="auto";>

    <h1>Improve your front-end skills by building projects</h1>

    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/Psalm-cell">Adesanya Samuel Semilogo</a>.
  </footer>
</body>
</html>
